<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatILearned — Documentation</title>
    <meta name="description" content="WhatILearned — Bilingual documentation hub for DevOps, security, and infrastructure">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --border: #30363d;
            --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
            --accent: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149;
            --code-bg: #151b23; --inline-bg: #21262d;
            --toc-bg: #0d1117; --toc-border: #21262d;
            --card-hover: #1f6feb11;
        }
        [data-theme="light"] {
            --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eef1f5; --border: #d0d7de;
            --text: #1f2328; --text2: #656d76; --text3: #afb8c1;
            --accent: #0969da; --green: #1a7f37; --orange: #9a6700; --red: #cf222e;
            --code-bg: #f6f8fa; --inline-bg: #eef1f5;
            --toc-bg: #ffffff; --toc-border: #d0d7de;
            --card-hover: #ddf4ff11;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px; transition: background 0.2s, color 0.2s; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: background 0.2s; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 16px; font-weight: 800; background: linear-gradient(135deg,var(--green),var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-header small { display: block; font-size: 11px; color: var(--text2); font-weight: 400; -webkit-text-fill-color: var(--text2); margin-top: 2px; }
        .sidebar-nav { padding: 8px 0; }
        .sidebar-label { padding: 6px 20px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }
        .sidebar-nav a { display: block; padding: 6px 20px; color: var(--text2); text-decoration: none; font-size: 13px; border-left: 2px solid transparent; transition: all 0.15s; }
        .sidebar-nav a:hover { color: var(--text); background: var(--bg3); }
        .sidebar-nav a.active { color: var(--accent); border-left-color: var(--accent); background: var(--card-hover); font-weight: 600; }
        .sidebar-cat { border-bottom: 1px solid var(--border); }
        .sidebar-cat-header { display: flex; align-items: center; padding: 8px 20px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); transition: background 0.15s; }
        .sidebar-cat-header:hover { background: var(--bg3); }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .sidebar-toggle { display: none; position: fixed; top: 10px; left: 10px; z-index: 200; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 18px; color: var(--text); line-height: 1; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        .content { flex: 1; margin-left: 260px; padding: 32px 48px 48px; max-width: 860px; }
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .sidebar-toggle { display: block; }
            .content { margin-left: 0; padding: 24px 20px; max-width: 100%; }
        }
        .theme-toggle { position: fixed; top: 10px; right: 12px; z-index: 300; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .theme-toggle:hover { background: var(--bg3); }
        .right-toc { position: fixed; top: 0; right: 0; width: 220px; height: 100vh; overflow-y: auto; padding: 56px 16px 24px 12px; border-left: 1px solid var(--toc-border); background: var(--toc-bg); transition: background 0.2s; display: none; }
        .right-toc-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 12px; }
        .right-toc a { display: block; padding: 3px 8px; font-size: 12.5px; color: var(--text2); text-decoration: none; border-left: 2px solid transparent; transition: all 0.15s; line-height: 1.6; }
        .right-toc a:hover { color: var(--text); }
        .right-toc a.active { color: var(--accent); border-left-color: var(--accent); }
        .right-toc a.lvl-h2 { padding-left: 8px; }
        .right-toc a.lvl-h3 { padding-left: 22px; font-size: 12px; }
        @media (min-width: 1400px) { .right-toc { display: block; } .content { max-width: 720px; padding: 32px 56px 48px 40px; } }
        @media (min-width: 1600px) { .right-toc { width: 250px; } }
        .markdown-body h1 { font-size: 32px; font-weight: 800; margin: 0 0 8px; background: linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.3; }
        .markdown-body .subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
        .markdown-body h2 { font-size: 22px; font-weight: 700; margin: 36px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .markdown-body h3 { font-size: 17px; font-weight: 600; margin: 24px 0 8px; }
        .markdown-body h4 { font-size: 15px; font-weight: 600; margin: 18px 0 6px; }
        .markdown-body p { margin: 0 0 12px; color: var(--text); }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body ul, .markdown-body ol { margin: 8px 0 16px; padding-left: 24px; }
        .markdown-body li { margin: 4px 0; }
        .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body blockquote { margin: 12px 0; padding: 8px 16px; border-left: 3px solid var(--accent); background: var(--bg3); border-radius: 0 6px 6px 0; }
        .markdown-body blockquote p { margin: 0; }
        .markdown-body code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; background: var(--inline-bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .markdown-body pre { margin: 12px 0 16px; padding: 14px 16px; background: var(--code-bg); border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; }
        .markdown-body pre code { background: none; padding: 0; border-radius: 0; font-size: 13px; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; font-size: 14px; }
        .markdown-body th, .markdown-body td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
        .markdown-body th { background: var(--bg2); font-weight: 600; }
        .markdown-body tr:nth-child(even) { background: var(--bg3); }
        .markdown-body img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
        .markdown-body .tag { display: inline-block; background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; margin: 1px 2px; border: 1px solid var(--border); }
        .markdown-body .tag.green { background: #10b98122; color: var(--green); border-color: #10b98144; }
        .markdown-body table tr:first-child th { position: sticky; top: 0; z-index: 1; }
        .home-header { text-align: center; padding: 0 0 24px; }
        .home-header h1 { font-size: 32px; font-weight: 800; margin: 0 0 4px; background: linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .home-header p { color: var(--text2); font-size: 14px; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .cat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; cursor: pointer; transition: all 0.15s; }
        .cat-card:hover { border-color: var(--accent); background: var(--bg3); transform: translateY(-2px); }
        .cat-card .emoji { font-size: 28px; display: block; margin-bottom: 8px; }
        .cat-card h3 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
        .cat-card .desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
        .cat-card .meta { font-size: 11px; color: var(--text3); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
        .home-greeting { padding: 8px 20px; }
        .home-greeting p { font-size: 13px; color: var(--text2); line-height: 1.5; }
        .article-list { max-width: 640px; margin: 0 auto; }
        .article-list h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .article-list .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; margin-bottom: 16px; cursor: pointer; }
        .article-list .back:hover { text-decoration: underline; }
        .article-item { display: block; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; text-decoration: none; color: var(--text); transition: all 0.15s; }
        .article-item:hover { border-color: var(--accent); background: var(--bg3); }
        .article-item .title { font-size: 14px; font-weight: 600; }
        .article-item .desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; padding: 80px 0; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 48px 0; color: var(--text2); }
        .error-state .emoji { font-size: 40px; margin-bottom: 12px; }
        .error-state h3 { color: var(--text); margin-bottom: 8px; }
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>📚 WhatILearned</h2>
                <small>Documentation Hub</small>
            </div>
            <div class="home-greeting">
                <p>Select a topic from the sidebar to start reading.</p>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>

        <main class="content" id="content">
            <div id="pageContent"></div>
        </main>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js">
    </script>
    <script>
        let currentFile = null;
        let siteData = null;

        // Fallback meta for categories when nav.json isn't available
        const fallbackMeta = {
            'terminal': { emoji: '🖥️', desc: 'ZSH, oh-my-zsh, colorls, terminal customization' },
            'security': { emoji: '🔒', desc: 'Supply chain security, best practices' },
            'cloudflare': { emoji: '☁️', desc: 'Pages, Workers, DNS, deployments' },
            'ai': { emoji: '🤖', desc: 'AI agent frameworks, comparisons, deep dives' },
            'infrastructure': { emoji: '⚙️', desc: 'Deployment, Docker, Traefik, Dokploy' },
            'compliance': { emoji: '🛡️', desc: 'Compliance scanning, CIS benchmarks, Lynis' }
        };

        // Backward compat: old URL patterns → new flat paths
        const oldUrlMap = {
            'en/terminal/colorls': 'terminal/colorls',
            'en/terminal/customize-terminal': 'terminal/customize-terminal',
            'en/security/supply-chain-security': 'security/supply-chain-security',
            'en/cloudflare/deploy-littlelink-to-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages',
            'en/cloudflare/deploy-littlelink-ke-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages',
            'id/terminal/colorls': 'terminal/colorls',
            'id/terminal/customize-terminal': 'terminal/customize-terminal',
            'id/keamanan/supply-chain-security': 'security/supply-chain-security',
            'id/security/supply-chain-security': 'security/supply-chain-security',
            'id/cloudflare/deploy-littlelink-ke-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages',
            'id/cloudflare/deploy-littlelink-to-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages'
        };

        async function loadNavData() {
            try {
                const resp = await fetch('nav.json?t=' + Date.now());
                if (!resp.ok) throw new Error('Not found');
                siteData = await resp.json();
            } catch (e) {
                // Fallback: construct from static meta (no article list)
                siteData = { categories: {}, order: [] };
                Object.keys(fallbackMeta).forEach(cat => {
                    siteData.categories[cat] = {
                        emoji: fallbackMeta[cat].emoji,
                        desc: fallbackMeta[cat].desc,
                        articles: []
                    };
                    siteData.order.push(cat);
                });
            }
            renderNav();
            handleHash();
        }

        function renderNav() {
            if (!siteData) return;
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';
            // Home link
            const homeDiv = document.createElement('div');
            homeDiv.className = 'sidebar-cat';
            const homeLink = document.createElement('div');
            homeLink.className = 'sidebar-cat-header';
            homeLink.innerHTML = '<span>🏠 Home</span>';
            homeLink.style.cursor = 'pointer';
            homeLink.onclick = () => { showHome(); if (window.innerWidth <= 900) closeSidebar(); };
            homeDiv.appendChild(homeLink);
            nav.appendChild(homeDiv);
            // Categories
            siteData.order.forEach(cat => {
                const info = siteData.categories[cat];
                if (!info) return;
                const label = document.createElement('div');
                label.className = 'sidebar-label';
                label.textContent = info.emoji + ' ' + cat.charAt(0).toUpperCase() + cat.slice(1);
                nav.appendChild(label);
                info.articles.forEach(file => {
                    const a = document.createElement('a');
                    const path = `${cat}/${file}`;
                    a.href = `#/${path}`;
                    a.textContent = file.replace(/-/g, ' ');
                    a.dataset.path = path;
                    a.onclick = (e) => {
                        e.preventDefault();
                        loadDoc(path);
                        if (window.innerWidth <= 900) closeSidebar();
                    };
                    nav.appendChild(a);
                });
            });
        }

        function showHome() {
            if (!siteData) return;
            const c = document.getElementById('pageContent');
            let html = `
                <div class="home-header">
                    <h1>📚 WhatILearned</h1>
                    <p>Documentation Hub</p>
                </div>
                <div class="categories-grid">
            `;
            siteData.order.forEach(cat => {
                const info = siteData.categories[cat];
                if (!info) return;
                html += `
                    <div class="cat-card" onclick="showCategory('${cat}')">
                        <span class="emoji">${info.emoji}</span>
                        <h3>${cat.charAt(0).toUpperCase() + cat.slice(1)}</h3>
                        <div class="desc">${info.desc}</div>
                        <div class="meta">${info.articles.length} article${info.articles.length !== 1 ? 's' : ''}</div>
                    </div>
                `;
            });
            html += `</div>`;
            c.innerHTML = html;
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            currentFile = null;
            history.replaceState(null, '', '#/');
        }

        function showCategory(cat) {
            if (!siteData || !siteData.categories[cat]) { showHome(); return; }
            const info = siteData.categories[cat];
            const files = info.articles;
            const c = document.getElementById('pageContent');
            const emoji = info.emoji;

            if (files.length === 0) {
                c.innerHTML = `
                    <div class="article-list">
                        <a class="back" onclick="showHome()">← Back to categories</a>
                        <h2>${emoji} ${cat.charAt(0).toUpperCase() + cat.slice(1)}</h2>
                        <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">${info.desc}</p>
                        <div class="error-state">
                            <div class="emoji">📭</div>
                            <h3>No articles yet</h3>
                        </div>
                    </div>
                `;
                return;
            }

            let itemsHtml = files.map(file => {
                const display = file.replace(/-/g, ' ');
                const path = `${cat}/${file}`;
                return `
                    <a class="article-item" href="#/${path}" onclick="event.preventDefault(); loadDoc('${path}')">
                        <div class="title">${display.charAt(0).toUpperCase() + display.slice(1)}</div>
                    </a>
                `;
            }).join('');

            c.innerHTML = `
                <div class="article-list">
                    <a class="back" onclick="showHome()">← Back to categories</a>
                    <h2>${emoji} ${cat.charAt(0).toUpperCase() + cat.slice(1)}</h2>
                    <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">${info.desc}</p>
                    <div id="articleItems">${itemsHtml}</div>
                </div>
            `;

            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            currentFile = null;
            history.replaceState(null, '', `#/${cat}`);
        }

        async function loadDoc(path) {
            const c = document.getElementById('pageContent');
            c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            const cat = path.split('/')[0];

            try {
                const resp = await fetch(`${path}.md?t=${Date.now()}`);
                if (!resp.ok) throw new Error('Not found');
                const md = await resp.text();

                // Strip YAML frontmatter (--- ... ---)
                const cleanMd = md.replace(/^---[\s\S]*?---\n*/, '');

                const html = marked.parse(cleanMd);
                c.innerHTML = `
                    <div class="markdown-body">
                        <div style="margin-bottom:16px">
                            <a href="#" onclick="showCategory('${cat}'); return false;" style="color:var(--accent);text-decoration:none;font-size:13px;font-weight:500;">← Back to list</a>
                        </div>
                        ${html}
                    </div>
                `;

                // Fix heading IDs
                c.querySelectorAll('h2, h3, h4').forEach(h => {
                    if (!h.id) {
                        h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                    }
                });

                // Update active nav link
                document.querySelectorAll('.sidebar-nav a').forEach(a => {
                    a.classList.toggle('active', a.dataset.path === path);
                });
                currentFile = path;

                window.scrollTo(0, 0);
                history.replaceState(null, '', `#/${path}`);

            } catch (e) {
                c.innerHTML = `
                    <div class="error-state">
                        <div class="emoji">🔍</div>
                        <h3>Page not found</h3>
                        <p>Could not load <code>${path}.md</code>.</p>
                        <p><a href="#" onclick="showCategory('${cat}'); return false;">← Back to list</a></p>
                    </div>
                `;
                currentFile = null;
            }
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        function handleHash() {
            const hash = location.hash.slice(1);
            if (!hash) { showHome(); return; }
            // Non-'/' hashes are regular anchor links — let the browser scroll
            if (!hash.startsWith('/')) return;
            const plainPath = hash.slice(1);
            // Check backward compat for old #/en/... or #/id/... URLs
            if (plainPath.startsWith('en/') || plainPath.startsWith('id/')) {
                const newPath = oldUrlMap[plainPath];
                if (newPath) {
                    history.replaceState(null, '', `#/${newPath}`);
                    loadDoc(newPath);
                    return;
                }
            }
            const parts = plainPath.split('/').filter(Boolean);
            if (parts.length >= 2) {
                // #/category/file → load article
                loadDoc(plainPath);
            } else if (parts.length === 1) {
                // #/category → show category list
                showCategory(parts[0]);
            } else {
                showHome();
            }
        }

        // Hash routing
        window.addEventListener('hashchange', handleHash);

        // Init
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        loadNavData();
    </script>
</body>
</html>
