<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatILearned — Documentation</title>
    <meta name="description" content="WhatILearned — Bilingual documentation hub for DevOps, security, and infrastructure">

    <!-- OG / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://notes.edsuwarna.id">
    <meta property="og:title" content="WhatILearned — Documentation Hub">
    <meta property="og:description" content="Personal documentation hub for DevOps, security, infrastructure, AI agents, and cloud tools. Bilingual (EN/ID).">
    <meta property="og:image" content="https://notes.edsuwarna.id/og-default.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="WhatILearned — Documentation Hub">
    <meta name="twitter:description" content="Personal documentation hub for DevOps, security, infrastructure, AI agents, and cloud tools.">
    <meta name="twitter:image" content="https://notes.edsuwarna.id/og-default.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --bg-subtle: #fafafa;
            --surface: #f4f4f5;
            --surface-hover: #eeeef0;
            --border: rgba(0,0,0,0.05);
            --border-medium: rgba(0,0,0,0.08);
            --text: #0d0d0d;
            --text-secondary: #666666;
            --text-tertiary: #888888;
            --text-muted: #aaaaaa;
            --accent: #18E299;
            --accent-deep: #0fa76e;
            --accent-subtle: #d4fae8;
            --shadow-card: rgba(0,0,0,0.03) 0px 2px 4px;
            --shadow-button: rgba(0,0,0,0.06) 0px 1px 2px;
            --radius-card: 16px;
            --radius-pill: 9999px;
            --radius-sm: 8px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Geist Mono', ui-monospace, monospace;
        }

        [data-theme="dark"] {
            --bg: #0d0d0d;
            --bg-subtle: #111111;
            --surface: #1a1a1a;
            --surface-hover: #222222;
            --border: rgba(255,255,255,0.06);
            --border-medium: rgba(255,255,255,0.1);
            --text: #ededed;
            --text-secondary: #a0a0a0;
            --text-tertiary: #707070;
            --text-muted: #555555;
            --accent: #18E299;
            --accent-deep: #4ade80;
            --accent-subtle: #0a2e1a;
            --shadow-card: rgba(0,0,0,0.4) 0px 2px 4px;
            --shadow-button: rgba(0,0,0,0.4) 0px 1px 2px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .layout { display: flex; min-height: 100vh; }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: background 0.2s, border-color 0.2s, transform 0.3s ease;
        }
        .sidebar-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .sidebar-header small {
            display: block;
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 400;
            margin-top: 1px;
        }

        .home-greeting {
            padding: 10px 24px 4px;
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        /* Search */
        .search-wrap {
            padding: 12px 16px 8px;
            position: relative;
        }
        .search-wrap .search-inner {
            position: relative;
        }
        .search-wrap input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(24, 226, 153, 0.12);
        }
        .search-wrap input::placeholder { color: var(--text-tertiary); }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
            width: 16px;
            height: 16px;
        }
        .search-results {
            display: none;
            margin: 4px 16px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            background: var(--surface);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        .search-results.open { display: block; }
        .search-result-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .search-result-item + .search-result-item {
            border-top: 1px solid var(--border);
        }
        .search-result-item:hover { background: var(--surface-hover); }
        .search-result-item .sr-r { flex: 1; min-width: 0; }
        .search-result-item .sr-title { font-weight: 500; font-size: 13px; color: var(--text); }
        .search-result-item .sr-cat { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
        .search-result-item .sr-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-noresults { padding: 14px; text-align: center; color: var(--text-tertiary); font-size: 13px; }

        /* Nav */
        .sidebar-nav { padding: 4px 0 16px; }
        .sidebar-label {
            padding: 12px 24px 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }
        .sidebar-nav a {
            display: block;
            padding: 5px 24px 5px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            border-left: 2px solid transparent;
            transition: all 0.15s;
        }
        .sidebar-nav a:hover {
            color: var(--text);
            background: var(--surface-hover);
        }
        .sidebar-nav a.active {
            color: var(--accent-deep);
            border-left-color: var(--accent);
            background: var(--accent-subtle);
            font-weight: 500;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .sidebar-cat { border-bottom: 1px solid var(--border); }
        .sidebar-cat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 24px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            transition: background 0.15s;
        }
        .sidebar-cat-header:hover { background: var(--surface-hover); }
        .sidebar-cat-header svg {
            width: 16px;
            height: 16px;
            color: var(--text-tertiary);
        }
        .sidebar-cat-header .cat-chevron {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
            transition: transform 0.25s ease;
        }
        .sidebar-cat-header:not(.open) .cat-chevron {
            transform: rotate(-90deg);
        }
        .sidebar-cat-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .sidebar-cat-body.open {
            max-height: 2000px;
        }
        .sidebar-cat-body a {
            padding: 5px 24px 5px 44px;
        }

        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 200;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            cursor: pointer;
            color: var(--text);
            line-height: 1;
            box-shadow: var(--shadow-button);
            transition: background 0.15s;
        }
        .sidebar-toggle:hover { background: var(--surface-hover); }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; backdrop-filter: blur(2px); }

        /* ============ MAIN CONTENT ============ */
        .content {
            flex: 1;
            margin-left: 280px;
            padding: 48px 48px 64px;
            max-width: 1024px;
        }

        /* ============ THEME TOGGLE ============ */
        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 300;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: var(--shadow-button);
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(24, 226, 153, 0.12);
        }

        /* ============ HOME PAGE ============ */
        .home-header {
            text-align: center;
            padding: 16px 0 40px;
        }
        .home-header h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.64px;
            line-height: 1.15;
            color: var(--text);
            margin-bottom: 8px;
        }
        .home-header p {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            max-width: 480px;
            margin: 0 auto;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
        }
        .cat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-card);
        }
        .cat-card:hover {
            border-color: var(--border-medium);
            box-shadow: rgba(0,0,0,0.06) 0px 4px 12px;
        }
        .cat-card .icon-wrap {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--accent-subtle);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 14px;
        }
        .cat-card .icon-wrap svg {
            width: 18px; height: 18px;
            stroke: var(--accent-deep);
            stroke-width: 1.5;
        }
        .cat-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
            color: var(--text);
        }
        .cat-card .desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .cat-card .meta {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        /* ============ CATEGORY LIST ============ */
        .article-list { max-width: 640px; margin: 0 auto; }
        .article-list .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .article-list .back:hover { color: var(--accent-deep); }
        .article-list h2 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.48px;
            margin-bottom: 20px;
        }
        .article-item {
            display: block;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            margin-bottom: 8px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
            box-shadow: var(--shadow-card);
        }
        .article-item:hover {
            border-color: var(--border-medium);
            box-shadow: rgba(0,0,0,0.06) 0px 4px 12px;
        }
        .article-item .title {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }
        .article-item .desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ============ MARKDOWN BODY ============ */
        .markdown-body {
            max-width: 800px;
        }
        .markdown-body h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.64px;
            margin: 0 0 6px;
            line-height: 1.15;
            color: var(--text);
        }
        .markdown-body .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
        }
        .markdown-body h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.44px;
            margin: 40px 0 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .markdown-body h3 {
            font-size: 17px;
            font-weight: 600;
            margin: 28px 0 8px;
        }
        .markdown-body h4 {
            font-size: 15px;
            font-weight: 600;
            margin: 20px 0 6px;
        }
        .markdown-body p { margin: 0 0 14px; color: var(--text); }
        .markdown-body a {
            color: var(--accent-deep);
            text-decoration: none;
            font-weight: 500;
        }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body ul, .markdown-body ol {
            margin: 8px 0 16px;
            padding-left: 24px;
        }
        .markdown-body li { margin: 4px 0; }
        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }
        .markdown-body strong { font-weight: 600; }
        .markdown-body blockquote {
            margin: 16px 0;
            padding: 12px 20px;
            border-left: 3px solid var(--accent);
            background: var(--bg-subtle);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        .markdown-body blockquote p { margin: 0; }
        .markdown-body code {
            font-family: var(--font-mono);
            background: var(--bg-subtle);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            border: 1px solid var(--border);
        }
        .markdown-body pre {
            margin: 16px 0 20px;
            padding: 16px 20px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            overflow-x: auto;
        }
        .markdown-body pre .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.15s, color 0.15s;
        }
        .markdown-body pre:hover .copy-btn {
            opacity: 1;
        }
        .markdown-body pre .copy-btn:hover {
            background: var(--surface-hover);
            color: var(--accent-deep);
            border-color: var(--accent);
        }
        .markdown-body pre .copy-btn.copied {
            opacity: 1;
            color: var(--accent-deep);
            border-color: var(--accent);
            background: var(--accent-subtle);
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            border: none;
            border-radius: 0;
            font-size: 13px;
            line-height: 1.6;
        }
        /* ── Syntax Highlighting ── */
        .hljs { color: var(--text); }
        .hljs-keyword { color: #8250df; }        /* keywords: SELECT, FROM, CREATE */
        .hljs-built_in { color: #8250df; }
        .hljs-type { color: #0550ae; }            /* types: INT, VARCHAR */
        .hljs-literal { color: #0550ae; }         /* literals: true, false, null */
        .hljs-number { color: #0550ae; }          /* numbers */
        .hljs-string { color: #0a3069; }          /* strings */
        .hljs-comment { color: #6e7781; font-style: italic; }
        .hljs-variable { color: #953800; }        /* env vars, variables */
        .hljs-attr { color: #0550ae; }            /* attributes, config keys */
        .hljs-title { color: #8250df; }           /* function names, titles */
        .hljs-params { color: #0d0d0d; }
        .hljs-property { color: #0550ae; }
        .hljs-punctuation { color: #57606a; }
        .hljs-operator { color: #0550ae; }
        .hljs-meta { color: #6e7781; }            /* shebang, directives */
        .hljs-section { color: #8250df; font-weight: 600; }  /* #!/bin/bash headers */

        [data-theme="dark"] .hljs-keyword { color: #d2a8ff; }
        [data-theme="dark"] .hljs-built_in { color: #d2a8ff; }
        [data-theme="dark"] .hljs-type { color: #91cbff; }
        [data-theme="dark"] .hljs-literal { color: #91cbff; }
        [data-theme="dark"] .hljs-number { color: #91cbff; }
        [data-theme="dark"] .hljs-string { color: #a5d6ff; }
        [data-theme="dark"] .hljs-comment { color: #8b949e; }
        [data-theme="dark"] .hljs-variable { color: #ffa657; }
        [data-theme="dark"] .hljs-attr { color: #91cbff; }
        [data-theme="dark"] .hljs-title { color: #d2a8ff; }
        [data-theme="dark"] .hljs-params { color: #ededed; }
        [data-theme="dark"] .hljs-property { color: #91cbff; }
        [data-theme="dark"] .hljs-punctuation { color: #8b949e; }
        [data-theme="dark"] .hljs-operator { color: #91cbff; }
        [data-theme="dark"] .hljs-meta { color: #8b949e; }
        [data-theme="dark"] .hljs-section { color: #d2a8ff; }
        /* ── End Syntax Highlighting ── */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 20px;
            font-size: 14px;
        }
        .markdown-body th, .markdown-body td {
            padding: 10px 14px;
            border: 1px solid var(--border);
            text-align: left;
        }
        .markdown-body th {
            background: var(--bg-subtle);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
        }
        .markdown-body tr:nth-child(even) { background: var(--bg-subtle); }
        .markdown-body img {
            max-width: 100%;
            border-radius: var(--radius-sm);
            margin: 16px 0;
            border: 1px solid var(--border);
        }
        .markdown-body .tag {
            display: inline-block;
            background: var(--accent-subtle);
            color: var(--accent-deep);
            font-size: 11px;
            font-weight: 500;
            padding: 2px 10px;
            border-radius: var(--radius-pill);
            margin: 1px 2px;
        }
        .markdown-body .tag.green {
            background: var(--accent-subtle);
            color: var(--accent-deep);
        }

        /* ============ LOADING / ERROR ============ */
        .loading { display: flex; align-items: center; justify-content: center; padding: 80px 0; }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 60px 0; color: var(--text-secondary); }
        .error-state h3 { color: var(--text); margin-bottom: 8px; font-weight: 600; }
        .error-state p { font-size: 14px; }
        .error-state code {
            font-family: var(--font-mono);
            background: var(--bg-subtle);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .error-state a {
            color: var(--accent-deep);
            text-decoration: none;
            font-weight: 500;
        }

        /* ============ RIGHT TOC ============ */
        .right-toc {
            position: fixed;
            top: 0;
            right: 0;
            width: 220px;
            height: 100vh;
            overflow-y: auto;
            padding: 56px 20px 24px 16px;
            border-left: 1px solid var(--border);
            background: var(--bg);
            display: none;
        }
        .right-toc-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .right-toc a {
            display: block;
            padding: 3px 8px 3px 10px;
            font-size: 12.5px;
            color: var(--text-tertiary);
            text-decoration: none;
            border-left: 2px solid transparent;
            transition: all 0.15s;
            line-height: 1.6;
        }
        .right-toc a:hover { color: var(--text-secondary); }
        .right-toc a.active {
            color: var(--accent-deep);
            border-left-color: var(--accent);
        }
        .right-toc a.lvl-h2 { padding-left: 10px; }
        .right-toc a.lvl-h3 { padding-left: 24px; font-size: 12px; }

        /* ============ RESPONSIVE ============ */
        @media (min-width: 1400px) {
            .right-toc { display: block; }
            .content { margin-left: 280px; max-width: 860px; padding: 48px 48px 64px; }
        }
        @media (min-width: 1600px) {
            .right-toc { width: 260px; }
            .content { margin-left: 280px; max-width: 960px; padding: 48px 56px 64px 48px; }
        }
        @media (min-width: 1800px) {
            .right-toc { width: 280px; }
            .content { margin-left: 280px; max-width: 1060px; padding: 48px 64px 64px; }
        }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .sidebar-toggle { display: block; }
            .content { margin-left: 0; padding: 24px 20px 48px; max-width: 100%; }
            .categories-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i data-lucide="menu" style="width:18px;height:18px;"></i>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>📖 WhatILearned</h2>
                <small>Documentation Hub</small>
            </div>
            <div class="home-greeting">
                Select a topic to start reading.
            </div>
            <div class="search-wrap">
                <div class="search-inner">
                    <i data-lucide="search" class="search-icon" style="width:16px;height:16px;"></i>
                    <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off">
                </div>
            </div>
            <div class="search-results" id="searchResults"></div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>

        <main class="content" id="content">
            <div id="pageContent"></div>
        </main>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i data-lucide="moon" style="width:16px;height:16px;" id="themeIcon"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/ini.min.js"></script>
    <script src="https://unpkg.com/minisearch@7/dist/umd/index.js"></script>
    <script>
        let currentFile = null;
        let siteData = null;

        // Lucide icon map per category
        const catIcons = {
            'ai': 'bot',
            'career': 'briefcase',
            'cloudflare': 'cloud',
            'compliance': 'shield',
            'infrastructure': 'server',
            'security': 'lock',
            'terminal': 'terminal'
        };

        // Fallback meta for categories
        const fallbackMeta = {
            'terminal': { emoji: '🖥️', desc: 'ZSH, oh-my-zsh, colorls, terminal customization' },
            'security': { emoji: '🔒', desc: 'Supply chain security, best practices' },
            'cloudflare': { emoji: '☁️', desc: 'Pages, Workers, DNS, deployments' },
            'ai': { emoji: '🤖', desc: 'AI agent frameworks, comparisons, deep dives' },
            'infrastructure': { emoji: '⚙️', desc: 'Deployment, Docker, Traefik, Dokploy' },
            'compliance': { emoji: '🛡️', desc: 'Compliance scanning, CIS benchmarks, Lynis' }
        };

        // Backward compat: old URL patterns → new flat paths
        const oldUrlMap = {
            'en/terminal/colorls': 'terminal/colorls',
            'en/terminal/customize-terminal': 'terminal/customize-terminal',
            'en/security/supply-chain-security': 'security/supply-chain-security',
            'en/cloudflare/deploy-littlelink-to-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages',
            'en/cloudflare/deploy-littlelink-ke-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages',
            'id/terminal/colorls': 'terminal/colorls',
            'id/terminal/customize-terminal': 'terminal/customize-terminal',
            'id/keamanan/supply-chain-security': 'security/supply-chain-security',
            'id/security/supply-chain-security': 'security/supply-chain-security',
            'id/cloudflare/deploy-littlelink-ke-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages',
            'id/cloudflare/deploy-littlelink-to-cloudflare-pages': 'cloudflare/deploy-littlelink-to-cloudflare-pages'
        };

        async function loadNavData() {
            try {
                const resp = await fetch('nav.json?t=' + Date.now());
                if (!resp.ok) throw new Error('Not found');
                siteData = await resp.json();
            } catch (e) {
                siteData = { categories: {}, order: [] };
                Object.keys(fallbackMeta).forEach(cat => {
                    siteData.categories[cat] = {
                        emoji: fallbackMeta[cat].emoji,
                        desc: fallbackMeta[cat].desc,
                        articles: []
                    };
                    siteData.order.push(cat);
                });
            }
            renderNav();
            handleHash();
            lucide.createIcons();
        }

        function renderNav() {
            if (!siteData) return;
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';

            // Home link
            const homeDiv = document.createElement('div');
            homeDiv.className = 'sidebar-cat';
            const homeLink = document.createElement('div');
            homeLink.className = 'sidebar-cat-header';
            homeLink.innerHTML = '<i data-lucide="home" style="width:16px;height:16px;"></i><span>Home</span>';
            homeLink.style.cursor = 'pointer';
            homeLink.onclick = () => { showHome(); if (window.innerWidth <= 900) closeSidebar(); };
            homeDiv.appendChild(homeLink);
            nav.appendChild(homeDiv);

            // Categories — collapsible
            siteData.order.forEach(cat => {
                const info = siteData.categories[cat];
                if (!info) return;
                const iconName = catIcons[cat] || 'file-text';
                const catName = cat.charAt(0).toUpperCase() + cat.slice(1);

                const catDiv = document.createElement('div');
                catDiv.className = 'sidebar-cat';

                const header = document.createElement('div');
                header.className = 'sidebar-cat-header';
                header.innerHTML = `
                    <i data-lucide="chevron-down" class="cat-chevron"></i>
                    <i data-lucide="${iconName}" style="width:14px;height:14px;"></i>
                    <span class="sidebar-label" style="padding:0;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;">${catName}</span>
                `;
                header.style.cursor = 'pointer';

                const body = document.createElement('div');
                body.className = 'sidebar-cat-body';

                info.articles.forEach(file => {
                    const a = document.createElement('a');
                    const path = `${cat}/${file}`;
                    a.href = `#/${path}`;
                    a.textContent = file.replace(/-/g, ' ');
                    a.dataset.path = path;
                    a.onclick = (e) => {
                        e.preventDefault();
                        loadDoc(path);
                        if (window.innerWidth <= 900) closeSidebar();
                    };
                    body.appendChild(a);
                });

                // Collapse state from localStorage (default: open)
                const saved = localStorage.getItem('nav-cat-' + cat);
                const defaultOpen = saved === null || saved === 'open';
                if (defaultOpen) {
                    header.classList.add('open');
                    body.classList.add('open');
                }

                header.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isOpen = header.classList.toggle('open');
                    body.classList.toggle('open');
                    localStorage.setItem('nav-cat-' + cat, isOpen ? 'open' : 'closed');
                });

                catDiv.appendChild(header);
                catDiv.appendChild(body);
                nav.appendChild(catDiv);
            });
            lucide.createIcons();
        }

        function showHome() {
            if (!siteData) return;
            const c = document.getElementById('pageContent');
            let html = `
                <div class="home-header">
                    <h1>📖 WhatILearned</h1>
                    <p>DevOps, infrastructure, security &amp; AI documentation</p>
                </div>
                <div class="categories-grid">
            `;
            siteData.order.forEach(cat => {
                const info = siteData.categories[cat];
                if (!info) return;
                const iconName = catIcons[cat] || 'file-text';
                html += `
                    <div class="cat-card" onclick="showCategory('${cat}')">
                        <div class="icon-wrap"><i data-lucide="${iconName}" style="width:18px;height:18px;"></i></div>
                        <h3>${cat.charAt(0).toUpperCase() + cat.slice(1)}</h3>
                        <div class="desc">${info.desc}</div>
                        <div class="meta">${info.articles.length} article${info.articles.length !== 1 ? 's' : ''}</div>
                    </div>
                `;
            });
            html += `</div>`;
            c.innerHTML = html;
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            currentFile = null;
            history.replaceState(null, '', '#/');
            updateMeta('WhatILearned — Documentation Hub', 'Personal documentation hub for DevOps, security, infrastructure, AI agents, and cloud tools.');
            lucide.createIcons();
        }

        function showCategory(cat) {
            if (!siteData || !siteData.categories[cat]) { showHome(); return; }
            const info = siteData.categories[cat];
            const files = info.articles;
            const c = document.getElementById('pageContent');

            if (files.length === 0) {
                c.innerHTML = `
                    <div class="article-list">
                        <a class="back" onclick="showHome()">← Back to categories</a>
                        <h2>${info.emoji || ''} ${cat.charAt(0).toUpperCase() + cat.slice(1)}</h2>
                        <p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">${info.desc}</p>
                        <div class="error-state">
                            <h3>No articles yet</h3>
                        </div>
                    </div>
                `;
                return;
            }

            let itemsHtml = files.map(file => {
                const display = file.replace(/-/g, ' ');
                const path = `${cat}/${file}`;
                return `
                    <a class="article-item" href="#/${path}" onclick="event.preventDefault(); loadDoc('${path}')">
                        <div class="title">${display.charAt(0).toUpperCase() + display.slice(1)}</div>
                    </a>
                `;
            }).join('');

            c.innerHTML = `
                <div class="article-list">
                    <a class="back" onclick="showHome()">← Back to categories</a>
                    <h2>${info.emoji || ''} ${cat.charAt(0).toUpperCase() + cat.slice(1)}</h2>
                    <p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">${info.desc}</p>
                    <div id="articleItems">${itemsHtml}</div>
                </div>
            `;

            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            currentFile = null;
            history.replaceState(null, '', `#/${cat}`);
            updateMeta((info.emoji || '') + ' ' + cat.charAt(0).toUpperCase() + cat.slice(1) + ' — WhatILearned', info.desc);
        }

        async function loadDoc(path) {
            const c = document.getElementById('pageContent');
            c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            const cat = path.split('/')[0];

            try {
                const resp = await fetch(`${path}.md?t=${Date.now()}`);
                if (!resp.ok) throw new Error('Not found');
                const md = await resp.text();
                const cleanMd = md.replace(/^---[\s\S]*?---\n*/, '');
                const html = marked.parse(cleanMd);
                c.innerHTML = `
                    <div class="markdown-body">
                        <div style="margin-bottom:16px">
                            <a href="#" onclick="showCategory('${cat}'); return false;" style="color:var(--text-secondary);text-decoration:none;font-size:13px;font-weight:500;">← Back to list</a>
                        </div>
                        ${html}
                    </div>
                `;

                // Add copy buttons to code blocks
                c.querySelectorAll('pre').forEach(function(pre) {
                    var btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerHTML = '<i data-lucide="copy" style="width:14px;height:14px;"></i>';
                    btn.setAttribute('aria-label', 'Copy code');
                    pre.style.position = 'relative';
                    pre.appendChild(btn);
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var code = pre.querySelector('code');
                        var text = code ? code.textContent : pre.textContent;
                        // Copy using fallback (works cross-browser, no permission issues)
                        var ta = document.createElement('textarea');
                        ta.value = text;
                        ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';
                        document.body.appendChild(ta);
                        ta.select();
                        try { document.execCommand('copy'); } catch(e) {}
                        document.body.removeChild(ta);
                        // Visual feedback
                        btn.innerHTML = '<i data-lucide="check" style="width:14px;height:14px;"></i>';
                        btn.classList.add('copied');
                        lucide.createIcons();
                        setTimeout(function() {
                            btn.innerHTML = '<i data-lucide="copy" style="width:14px;height:14px;"></i>';
                            btn.classList.remove('copied');
                            lucide.createIcons();
                        }, 2000);
                    });
                });
                lucide.createIcons();

                // Highlight code blocks
                if (typeof hljs !== 'undefined') {
                    c.querySelectorAll('pre code').forEach(function(block) {
                        hljs.highlightElement(block);
                    });
                }

                // Fix heading IDs
                c.querySelectorAll('h2, h3, h4').forEach(function(h) {
                    if (!h.id) {
                        h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                    }
                });

                document.querySelectorAll('.sidebar-nav a').forEach(a => {
                    a.classList.toggle('active', a.dataset.path === path);
                });
                // Auto-expand parent category when article is active
                const activeLink = document.querySelector('.sidebar-nav a[data-path="' + CSS.escape(path) + '"]');
                if (activeLink) {
                    const parentCat = activeLink.closest('.sidebar-cat');
                    if (parentCat) {
                        const header = parentCat.querySelector('.sidebar-cat-header');
                        const body = parentCat.querySelector('.sidebar-cat-body');
                        if (header && !header.classList.contains('open')) {
                            header.classList.add('open');
                            body.classList.add('open');
                            const cat = path.split('/')[0];
                            localStorage.setItem('nav-cat-' + cat, 'open');
                        }
                    }
                }
                currentFile = path;

                window.scrollTo(0, 0);
                history.replaceState(null, '', `#/${path}`);

                var titleEl = c.querySelector('h1');
                if (titleEl) updateMeta(titleEl.textContent.replace(/^[^\s]+\s/, '').trim());

            } catch (e) {
                c.innerHTML = `
                    <div class="error-state">
                        <h3>Page not found</h3>
                        <p>Could not load <code>${path}.md</code>.</p>
                        <p><a href="#" onclick="showCategory('${cat}'); return false;">← Back to list</a></p>
                    </div>
                `;
                currentFile = null;
            }
        }

        /** Update page title + OG meta tags dynamically */
        function updateMeta(title, desc) {
            document.title = title;
            var fullTitle = title + ' — WhatILearned';
            setMeta('og:title', fullTitle);
            setMeta('twitter:title', fullTitle);
            if (desc) {
                setMeta('og:description', desc);
                setMeta('twitter:description', desc);
                document.querySelector('meta[name="description"]').content = desc;
            }
        }
        function setMeta(prop, value) {
            var el = document.querySelector('meta[property="' + prop + '"]') ||
                     document.querySelector('meta[name="' + prop + '"]');
            if (!el) {
                el = document.createElement('meta');
                if (prop.indexOf('og:') === 0) el.setAttribute('property', prop);
                else el.setAttribute('name', prop);
                document.head.appendChild(el);
            }
            el.content = value;
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        // Init theme from localStorage or default light
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeIcon.setAttribute('data-lucide', savedTheme === 'dark' ? 'sun' : 'moon');

        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            themeIcon.setAttribute('data-lucide', isDark ? 'moon' : 'sun');
            localStorage.setItem('theme', newTheme);
            lucide.createIcons();
        });

        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        function handleHash() {
            const hash = location.hash.slice(1);
            if (!hash) { showHome(); return; }
            if (!hash.startsWith('/')) return;
            const plainPath = hash.slice(1);
            if (plainPath.startsWith('en/') || plainPath.startsWith('id/')) {
                const newPath = oldUrlMap[plainPath];
                if (newPath) {
                    history.replaceState(null, '', `#/${newPath}`);
                    loadDoc(newPath);
                    return;
                }
            }
            const parts = plainPath.split('/').filter(Boolean);
            if (parts.length >= 2) {
                loadDoc(plainPath);
            } else if (parts.length === 1) {
                showCategory(parts[0]);
            } else {
                showHome();
            }
        }

        window.addEventListener('hashchange', handleHash);

        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // --- MiniSearch ---
        var miniSearch = new MiniSearch({
            fields: ['title', 'content'],
            storeFields: ['title', 'cat', 'path', 'emoji'],
            searchOptions: {
                boost: { title: 3, content: 1 },
                prefix: true,
                fuzzy: 0.2
            }
        });
        var searchIndexed = false;

        async function buildSearchIndex() {
            if (!siteData || searchIndexed) return;
            var docs = [];
            for (var cat in siteData.categories) {
                var info = siteData.categories[cat];
                for (var i = 0; i < info.articles.length; i++) {
                    var path = cat + '/' + info.articles[i];
                    try {
                        var resp = await fetch(path + '.md?t=' + Date.now());
                        if (!resp.ok) continue;
                        var md = await resp.text();
                        var clean = md.replace(/^---[\s\S]*?---[ \t]*\n*/, '');
                        docs.push({
                            id: path,
                            title: (info.emoji || '') + ' ' + info.articles[i].replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); }),
                            content: clean,
                            cat: cat,
                            path: path,
                            emoji: info.emoji || ''
                        });
                    } catch(e) {}
                }
            }
            if (docs.length) {
                miniSearch.addAll(docs);
                searchIndexed = true;
            }
        }

        var searchInput = document.getElementById('searchInput');
        var searchResults = document.getElementById('searchResults');
        var searchTimer = null;

        if (searchInput) {
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimer);
                var q = searchInput.value.trim();
                if (!q) { searchResults.classList.remove('open'); searchResults.innerHTML = ''; return; }
                if (!searchIndexed) { return; }
                searchTimer = setTimeout(function() {
                    var results = miniSearch.search(q, { prefix: true, fuzzy: 0.2 });
                    var html = '';
                    if (results.length === 0) {
                        html = '<div class="search-noresults">No results found</div>';
                    } else {
                        for (var r = 0; r < Math.min(results.length, 10); r++) {
                            var hit = results[r];
                            var cleanTitle = hit.title.replace(/^[^\s]+\s/, '');
                            var cleanDesc = hit.content ? hit.content.replace(/[#*\[\]>|]/g, ' ').substring(0, 100) : '';
                            html += '<a class="search-result-item" data-path="' + hit.path + '">' +
                                '<div class="sr-r">' +
                                '<div class="sr-title">' + (hit.emoji || '') + ' ' + cleanTitle + '</div>' +
                                '<div class="sr-cat">' + hit.cat.charAt(0).toUpperCase() + hit.cat.slice(1) + '</div>' +
                                '<div class="sr-desc">' + cleanDesc + '</div>' +
                                '</div>' +
                                '</a>';
                        }
                    }
                    searchResults.innerHTML = html;
                    searchResults.classList.add('open');
                }, 250);
            });

            // Event delegation for search results
            searchResults.addEventListener('click', function(e) {
                var a = e.target.closest('.search-result-item');
                if (a) {
                    e.preventDefault();
                    closeSidebar();
                    loadDoc(a.getAttribute('data-path'));
                }
            });
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') { searchInput.value = ''; searchResults.classList.remove('open'); searchInput.blur(); }
            });
        }

        // Build search index after nav loads
        var origRenderNav = renderNav;
        renderNav = function() {
            origRenderNav();
            buildSearchIndex();
        };

        loadNavData();
        lucide.createIcons();
    </script>
</body>
</html>
